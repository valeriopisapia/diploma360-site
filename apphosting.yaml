# Firebase App Hosting — backend runtime config.
# Docs: https://firebase.google.com/docs/app-hosting/configure
#
# Secrets are stored in Cloud Secret Manager and injected as env vars into the
# Next.js server at runtime (read by app/api/lead/route.ts). Create them once with:
#   firebase apphosting:secrets:set BREVO_API_KEY
#   firebase apphosting:secrets:set BREVO_LIST_ID

runConfig:
  minInstances: 0
  # maxInstances/concurrency/cpu can be tuned later; defaults are fine to start.

env:
  - variable: BREVO_API_KEY
    secret: BREVO_API_KEY
    availability:
      - RUNTIME
  - variable: BREVO_LIST_ID
    secret: BREVO_LIST_ID
    availability:
      - RUNTIME
