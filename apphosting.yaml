# Firebase App Hosting — backend runtime config.
# Docs: https://firebase.google.com/docs/app-hosting/configure
#
# Brevo secrets (Cloud Secret Manager), set once per project — grant access when prompted:
#   firebase apphosting:secrets:set BREVO_API_KEY
#   firebase apphosting:secrets:set BREVO_LIST_ID
#
# BRAND SELECTION — NOT here. Both brands run as separate BACKENDS in the SAME project
# (`diploma360-site`, `lascuola360-site`), so a per-project secret can't differ between
# them. Brand is set PER-BACKEND via `NEXT_PUBLIC_BRAND` (console: App Hosting → backend
# → Settings → Environment; console values override this file, at BUILD too):
#   - diploma360-site : nothing to set — lib/brand.ts defaults to 'diploma360'
#   - lascuola360-site: NEXT_PUBLIC_BRAND = lascuola360
# See docs/DEPLOY.md §G.

runConfig:
  minInstances: 0
  # maxInstances/concurrency/cpu can be tuned later; defaults are fine to start.

env:
  - variable: BREVO_API_KEY
    secret: BREVO_API_KEY
    availability:
      - RUNTIME
  - variable: BREVO_LIST_ID
    secret: BREVO_LIST_ID
    availability:
      - RUNTIME
